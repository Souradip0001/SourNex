<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOURNEX | Multi-AI Luxury Thread</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        luxury: {
                            dark: "#0B0B0C",
                            surface: "#141417",
                            border: "#222226",
                            gold: {
                                DEFAULT: "#D4AF37",
                                muted: "#AA7C11",
                                light: "#F3E5AB"
                            }
                        }
                    },
                    boxShadow: {
                        'gold-glow': '0 0 20px rgba(212, 175, 55, 0.05)',
                        'gold-glow-focus': '0 0 25px rgba(212, 175, 55, 0.15)'
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0B0B0C; }
        ::-webkit-scrollbar-thumb { background: #222226; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #D4AF37; }
        
        .gold-gradient-text {
            background: linear-gradient(135deg, #FFF 40%, #D4AF37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-luxury-dark text-white min-h-screen flex flex-col font-sans selection:bg-luxury-gold/30 selection:text-white">

    <!-- Premium Top Navigation Bar -->
    <header class="h-16 border-b border-luxury-border bg-luxury-dark/80 backdrop-blur-md sticky top-0 z-50 px-6 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="h-8 w-8 border border-luxury-gold flex items-center justify-center rotate-45 transform transition-transform hover:rotate-90 duration-500">
                <span class="-rotate-45 text-xs font-serif text-luxury-gold font-bold">S</span>
            </div>
            <h1 class="text-xl font-bold tracking-[0.25em] uppercase gold-gradient-text">Sournex</h1>
        </div>
        <div class="flex items-center space-x-4">
            <span class="text-xs tracking-widest text-zinc-500 uppercase">Engine: Sequential</span>
            <div class="h-2 w-2 rounded-full bg-luxury-gold animate-pulse"></div>
        </div>
    </header>

    <!-- Main Thread Area (Single Unified Column Layout) -->
        <main class="flex-1 max-w-3xl w-full mx-auto px-4 py-6 overflow-y-auto space-y-6 h-[calc(100vh-8.5rem)]" id="chat-thread">
        
        <div class="flex items-start space-x-4 opacity-80 animate-fade-in">
            <div class="h-8 w-8 rounded border border-luxury-gold/30 bg-luxury-surface flex items-center justify-center flex-shrink-0 text-[10px] text-luxury-gold font-serif">
                SYS
            </div>
            <div class="bg-luxury-surface border border-luxury-border p-4 rounded-xl shadow-gold-glow max-w-[85%]">
                <p class="text-xs text-luxury-gold tracking-wider uppercase mb-1 font-semibold">Sournex Core</p>
                <p class="text-sm text-zinc-300 leading-relaxed">
                    Welcome to your luxury orchestration space. Type a prompt below to begin. Each response acts as the baseline layer for whichever model you select next.
                </p>
            </div>
        </div>

        </main>


    <!-- Master Command Center Menu Bar -->
    <footer class="p-4 border-t border-luxury-border bg-luxury-surface/40 backdrop-blur-md">
        <div class="max-w-3xl mx-auto space-y-3">
            
            <!-- Model Routing Toolbar Selector -->
            <div class="flex items-center space-x-2 text-xs">
                <span class="text-zinc-500 uppercase tracking-widest text-[10px]">Route next command to:</span>
                
                <!-- Target Model Buttons -->
                <div class="flex items-center bg-luxury-dark p-1 rounded-lg border border-luxury-border space-x-1">
                    <button class="px-3 py-1 rounded bg-luxury-gold text-black font-semibold uppercase tracking-wider text-[10px] transition-all duration-200">
                        OpenAI
                    </button>
                    <button class="px-3 py-1 rounded text-zinc-400 hover:text-white uppercase tracking-wider text-[10px] transition-all duration-200">
                        Gemini
                    </button>
                    <button class="px-3 py-1 rounded text-zinc-400 hover:text-white uppercase tracking-wider text-[10px] transition-all duration-200">
                        Claude
                    </button>
                </div>
            </div>

            <!-- Main Input field structure -->
            <div class="relative flex items-center">
                <textarea id="master-input" rows="1" class="w-full bg-luxury-surface border border-luxury-border text-white placeholder-zinc-500 text-sm rounded-xl pl-4 pr-16 py-3.5 focus:outline-none focus:border-luxury-gold focus:shadow-gold-glow-focus resize-none transition-all duration-300" placeholder="Type instructions for the next model layer..."></textarea>
                
                <button id="send-btn" class="absolute right-2 top-1.5 bottom-1.5 px-4 bg-gradient-to-r from-luxury-gold-muted to-luxury-gold text-black font-medium text-xs tracking-widest uppercase rounded-lg hover:from-luxury-gold hover:to-luxury-gold-light transition-all duration-300 shadow-md active:scale-95">
                    Run
                </button>
            </div>

        </div>
    </footer>

</body>
</html>
